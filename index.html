<script>
// в”Ђв”Ђв”Ђ DATA в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

    s.push({ id: teamId + '-' + (i + 2), num: i + 2, label: 'Jug.' + i });

}

  ]},
  { id:'grupoD', name:'Grupo D', teams:[
    { id:'usa', name:'Estados Unidos', flag:'рџ‡єрџ‡ё', stickers:mkStickers('usa') },
    { id:'par', name:'Paraguay',       flag:'рџ‡µрџ‡ѕ', stickers:mkStickers('par') },
    { id:'aus', name:'Australia',      flag:'рџ‡¦рџ‡є', stickers:mkStickers('aus') },
    { id:'tur', name:'TurquГ­a',        flag:'рџ‡№рџ‡·', stickers:mkStickers('tur') },
  ]},
  { id:'grupoE', name:'Grupo E', teams:[

  ]},
  { id:'grupoF', name:'Grupo F', teams:[
    { id:'ned', name:'PaГ­ses Bajos', flag:'рџ‡ірџ‡±', stickers:mkStickers('ned') },
    { id:'jpn', name:'JapГіn',        flag:'рџ‡Їрџ‡µ', stickers:mkStickers('jpn') },

  ]},
  { id:'grupoG', name:'Grupo G', teams:[
    { id:'bel', name:'BГ©lgica',       flag:'рџ‡§рџ‡Є', stickers:mkStickers('bel') },
    { id:'egy', name:'Egipto',        flag:'рџ‡Єрџ‡¬', stickers:mkStickers('egy') },
    { id:'irn', name:'IrГЎn',          flag:'рџ‡®рџ‡·', stickers:mkStickers('irn') },
    { id:'nzl', name:'Nueva Zelanda', flag:'рџ‡ірџ‡ї', stickers:mkStickers('nzl') },
  ]},
  { id:'grupoH', name:'Grupo H', teams:[
    { id:'esp', name:'EspaГ±a',        flag:'рџ‡Єрџ‡ё', stickers:mkStickers('esp') },
    { id:'cpv', name:'Cabo Verde',    flag:'рџ‡Ёрџ‡»', stickers:mkStickers('cpv') },
    { id:'ksa', name:'Arabia Saudita',flag:'рџ‡ёрџ‡¦', stickers:mkStickers('ksa') },
    { id:'uru', name:'Uruguay',       flag:'рџ‡єрџ‡ѕ', stickers:mkStickers('uru') },
  ]},
  { id:'grupoI', name:'Grupo I', teams:[
    { id:'fra', name:'Francia', flag:'рџ‡«рџ‡·', stickers:mkStickers('fra') },
    { id:'irq', name:'Irak',    flag:'рџ‡®рџ‡¶', stickers:mkStickers('irq') },
    { id:'sen', name:'Senegal', flag:'рџ‡ёрџ‡і', stickers:mkStickers('sen') },
    { id:'nor', name:'Noruega', flag:'рџ‡ірџ‡ґ', stickers:mkStickers('nor') },
  ]},
  { id:'grupoJ', name:'Grupo J', teams:[
    { id:'arg', name:'Argentina', flag:'рџ‡¦рџ‡·', stickers:mkStickers('arg') },
    { id:'alg', name:'Argelia',   flag:'рџ‡©рџ‡ї', stickers:mkStickers('alg') },
    { id:'aut', name:'Austria',   flag:'рџ‡¦рџ‡№', stickers:mkStickers('aut') },
    { id:'jor', name:'Jordania',  flag:'рџ‡Їрџ‡ґ', stickers:mkStickers('jor') },
  ]},
  { id:'grupoK', name:'Grupo K', teams:[
    { id:'por', name:'Portugal',  flag:'рџ‡µрџ‡№', stickers:mkStickers('por') },
    { id:'cod', name:'RD Congo',  flag:'рџ‡Ёрџ‡©', stickers:mkStickers('cod') },
    { id:'uzb', name:'UzbekistГЎn',flag:'рџ‡єрџ‡ї', stickers:mkStickers('uzb') },
    { id:'col', name:'Colombia',  flag:'рџ‡Ёрџ‡ґ', stickers:mkStickers('col') },
  ]},
  { id:'grupoL', name:'Grupo L', teams:[
    { id:'eng', name:'Inglaterra', flag:'рџЏґу Ѓ§у Ѓўу ЃҐу Ѓ®у Ѓ§у Ѓї', stickers:mkStickers('eng') },
    { id:'cro', name:'Croacia',    flag:'рџ‡­рџ‡·', stickers:mkStickers('cro') },
    { id:'gha', name:'Ghana',      flag:'рџ‡¬рџ‡­', stickers:mkStickers('gha') },
    { id:'pan', name:'PanamГЎ',     flag:'рџ‡µрџ‡¦', stickers:mkStickers('pan') },
  ]},
];

// Sticker в†’ team lookup map (precomputed)
const stickerMap = {};
for (const sec of SECTIONS)
  for (const team of sec.teams)
    for (const st of team.stickers)
      stickerMap[st.id] = { sec, team };

const ALL_IDS = Object.keys(stickerMap);

// в”Ђв”Ђв”Ђ STATE в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

const STORAGE_KEY = 'album-mundial-2026-v3';
let collected = {};
let openTeams = new Set();
let currentFilter = 'all';

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) collected = JSON.parse(raw).collected || {};
  } catch(e) { collected = {}; }
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify({ collected })); } catch(e) {}
}

// в”Ђв”Ђв”Ђ STATS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function updateStats() {
  const total = ALL_IDS.length;
  const got = ALL_IDS.filter(id => collected[id]).length;
  const miss = total - got;
  document.querySelector('#si-collected .stat-number').textContent = got;
  document.querySelector('#si-missing .stat-number').textContent = miss;
  document.querySelector('#si-total .stat-number').textContent = total;
  document.getElementById('progress-fill').style.width = (total ? (got/total*100).toFixed(1) : 0) + '%';
}

function teamStats(team) {
  const total = team.stickers.length;
  const done = team.stickers.filter(s => collected[s.id]).length;
  return { total, done, pct: total ? Math.round(done/total*100) : 0 };
}

// в”Ђв”Ђв”Ђ RENDER в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function buildTeamCard(sec, team) {
  const { total, done, pct } = teamStats(team);
  const isOpen = openTeams.has(team.id);
  const complete = done === total;

  const card = document.createElement('div');
  card.className = 'team-card' + (isOpen ? ' open' : '');
  card.dataset.teamId = team.id;
  if (complete) card.dataset.complete = 'true';

  // Header
  const toggle = document.createElement('div');
  toggle.className = 'team-toggle';
  toggle.innerHTML = `
    <span class="team-flag">${team.flag}</span>
    <div class="team-info">
      <div class="team-name">${team.name}</div>
      <div class="team-progress-text">${done}/${total} figuritas</div>
    </div>
    <div class="team-mini-bar-wrap">
      <div class="team-mini-bar"><div class="team-mini-fill" style="width:${pct}%"></div></div>
      <div class="team-pct">${pct}%</div>
    </div>
    <span class="team-chevron">в–ј</span>
  `;
  toggle.addEventListener('click', () => toggleTeam(team.id));
  card.appendChild(toggle);

  // Stickers panel
  const panel = document.createElement('div');
  panel.className = 'stickers-panel';

  const selBtns = document.createElement('div');
  selBtns.className = 'select-btns';
  selBtns.innerHTML = `
    <button class="mini-btn">вњ“ Marcar todas</button>
    <button class="mini-btn">вњ— Desmarcar</button>
  `;
  selBtns.children[0].addEventListener('click', e => { e.stopPropagation(); markAll(team.id, true); });
  selBtns.children[1].addEventListener('click', e => { e.stopPropagation(); markAll(team.id, false); });
  panel.appendChild(selBtns);

  const grid = document.createElement('div');
  grid.className = 'stickers-grid';
  grid.dataset.gridTeam = team.id;
  for (const st of team.stickers) {
    const btn = document.createElement('button');
    btn.className = 'sticker-btn ' + (collected[st.id] ? 'collected' : 'missing');
    btn.dataset.stickerId = st.id;
    btn.innerHTML = `<span class="sticker-num">${st.num}</span><span class="sticker-label">${st.label}</span>`;
    btn.addEventListener('click', () => toggleSticker(st.id));
    grid.appendChild(btn);
  }
  panel.appendChild(grid);
  card.appendChild(panel);
  return card;
}

function render() {
  const container = document.getElementById('app-body');
  const q = document.getElementById('search-input').value.toLowerCase().trim();
  container.innerHTML = '';
  let any = false;

  for (const sec of SECTIONS) {
    let teams = sec.teams;
    if (q) teams = teams.filter(t => t.name.toLowerCase().includes(q));
    if (currentFilter === 'incomplete') teams = teams.filter(t => { const {done,total} = teamStats(t); return done < total; });
    if (currentFilter === 'complete')   teams = teams.filter(t => { const {done,total} = teamStats(t); return done === total; });
    if (!teams.length) continue;
    any = true;

    const secEl = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'section-title';
    title.textContent = sec.name;
    secEl.appendChild(title);
    for (const team of teams) secEl.appendChild(buildTeamCard(sec, team));
    container.appendChild(secEl);
  }

  if (!any) container.innerHTML = '<div class="empty-msg">No se encontraron equipos.</div>';
}

// в”Ђв”Ђв”Ђ ACTIONS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

function toggleTeam(teamId) {
  openTeams.has(teamId) ? openTeams.delete(teamId) : openTeams.add(teamId);
  const card = document.querySelector(`[data-team-id="${teamId}"]`);
  if (card) card.classList.toggle('open', openTeams.has(teamId));
}

function patchTeamCard(teamId) {
  const card = document.querySelector(`[data-team-id="${teamId}"]`);
  if (!card) return;
  const info = stickerMap[Object.keys(stickerMap).find(id => stickerMap[id].team.id === teamId)];
  if (!info) return;
  const { total, done, pct } = teamStats(info.team);
  card.querySelector('.team-progress-text').textContent = `${done}/${total} figuritas`;
  card.querySelector('.team-mini-fill').style.width = pct + '%';
  card.querySelector('.team-pct').textContent = pct + '%';
  if (done === total) card.dataset.complete = 'true';
  else delete card.dataset.complete;
}

function toggleSticker(id) {
  collected[id] = !collected[id];
  saveState();
  const btn = document.querySelector(`[data-sticker-id="${id}"]`);
  if (btn) btn.className = 'sticker-btn ' + (collected[id] ? 'collected' : 'missing');
  patchTeamCard(stickerMap[id].team.id);
  updateStats();
}

function markAll(teamId, state) {
  const info = Object.values(stickerMap).find(v => v.team.id === teamId);
  if (!info) return;
  for (const st of info.team.stickers) collected[st.id] = state;
  saveState();
  const grid = document.querySelector(`[data-grid-team="${teamId}"]`);
  if (grid) grid.querySelectorAll('.sticker-btn').forEach(btn => {
    btn.className = 'sticker-btn ' + (collected[btn.dataset.stickerId] ? 'collected' : 'missing');
  });
  patchTeamCard(teamId);
  updateStats();
  if (currentFilter !== 'all') render();
}

// в”Ђв”Ђв”Ђ EVENTS в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

document.getElementById('search-input').addEventListener('input', render);

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b === btn));
    render();
  });
});

document.getElementById('reset-btn').addEventListener('click', () => {
  if (confirm('ВїSegura que querГ©s reiniciar todo el ГЎlbum?\nSe van a borrar todas las figuritas marcadas.')) {
    collected = {};
    saveState();
    render();
    updateStats();
  }
});

// в”Ђв”Ђв”Ђ INIT в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ

loadState();
render();
updateStats();
</script>
